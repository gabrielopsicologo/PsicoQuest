}; function home(){ app.innerHTML = `<section class="hero"><h1>Baixa Demanda 3</h1><p>Atividades visuais, concretas e de baixa leitura para uso mediado com crianças/adolescentes que precisam de comandos simples, escolha por toque e pouca exigência verbal.</p><div class="tagrow"><span class="tag">toque</span><span class="tag">arraste opcional</span><span class="tag">baixa leitura</span><span class="tag">mediação profissional</span><span class="tag">offline</span></div></section><section class="grid">${tools.map(t=>`<article class="tool-card"><div class="iconbig">${t.icon}</div><h2>${t.title}</h2><p>${t.desc}</p><div class="actions"><a class="btn" href="#${t.id}">Abrir</a></div></article>`).join('')}</section>`;
}
function screenShell(tool, body){ app.innerHTML = `<section class="screen active" id="screen-${tool.id}"><div class="toolbar"><a class="btn secondary" href="#">← Central</a><button class="btn soft" onclick="newRound('${tool.id}')">Nova rodada</button><button class="btn soft" onclick="print()">Imprimir</button><button class="btn secondary" onclick="copyRecord('${tool.id}')">Copiar registro</button><button class="btn danger" onclick="clearActivity('${tool.id}')">Limpar</button><span class="mini-note">Dica: no celular, toque no item e depois no lugar.</span></div><div class="panel"><div class="activity-head"><div class="activity-title"><div class="emoji">${tool.icon}</div><div><h1>${tool.title}</h1><p>${tool.desc}</p></div></div></div>${body}</div></section>`;
}
function tileHtml(item, extra=''){ const id = uid(); return `<div class="tile ${extra}" draggable="true" data-id="${id}" data-key="${escapeAttr(item[2]||item[1]||'')}" data-order="${escapeAttr(item[0]||'')}"><span class="emoji">${item[0]}</span><span class="label">${item[1]||''}</span></div>`;
}
function escapeAttr(s){return String(s).replace(/"/g,'&quot;')}
function setupClickableTiles(){ selectedTile = null; $$('.tile').forEach(tile=>{ tile.addEventListener('dragstart',e=>{selectedTile=tile; tile.classList.add('dragging'); e.dataTransfer.setData('text/plain', tile.dataset.id||'tile');}); tile.addEventListener('dragend',()=>tile.classList.remove('dragging')); tile.addEventListener('click',e=>{ if(tile.closest('.dropzone')){ selectedTile=tile; markSelected(tile); return; } selectedTile=tile; markSelected(tile); }); }); $$('.dropzone').forEach(zone=>{ zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('hover')}); zone.addEventListener('dragleave',()=>zone.classList.remove('hover')); zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('hover'); if(selectedTile) zone.appendChild(selectedTile); selectedTile=null; setupClickableTiles();}); zone.addEventListener('click',e=>{ if(e.target.closest('.tile')) return; if(selectedTile){ zone.appendChild(selectedTile); selectedTile=null; setupClickableTiles(); }}); });
}
function markSelected(tile){$$('.tile').forEach(t=>t.classList.remove('selected')); tile.classList.add('selected')}
function fb(text,type='warn'){const f=$('#feedback'); if(f){f.className='feedback '+type; f.textContent=text;}}
function celebrate(){const c=$('#confetti'); if(!c) return; c.innerHTML=''; for(let i=0;i<18;i++){const s=document.createElement('span'); s.textContent=['⭐','✨','💙','🌈','✅'][i%5]; s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*10+'px'; s.style.animationDelay=(i*25)+'ms'; c.appendChild(s);} setTimeout(()=>c.innerHTML='',1300)}
function record(toolId, text){log.push({toolId,text,time:new Date().toLocaleString('pt-BR')}); localStorage.setItem('psicoquest_lote9_log', JSON.stringify(log.slice(-50)));}
function copyRecord(toolId){const tool=tools.find(t=>t.id===toolId); const lines=log.filter(x=>x.toolId===toolId).slice(-8).map(x=>`- ${x.time}: ${x.text}`); const txt=`PsicoQuest — ${tool?tool.title:toolId}\n${lines.length?lines.join('\n'):'Sem registro nesta atividade ainda.'}`; navigator.clipboard?.writeText(txt); fb('Registro copiado.', 'ok');}
function clearActivity(toolId){localStorage.removeItem('psicoquest_lote9_'+toolId); newRound(toolId)}
function newRound(id){routeTo(id,true)}
function routeTo(id, force=false){ const tool=tools.find(t=>t.id===id); if(!tool){home();return;} renderers[id](tool,force); }
window.addEventListener('hashchange',()=>routeTo(location.hash.replace('#',''))); const renderers = { onde(tool){ const round = shuffle(banks.onde)[0]; activityState.onde = round; const body = `<div class="play-area"><div class="instruction">Ache todos iguais a:</div><div><span class="big-target"><span>${round.target[0]}</span><span>${round.target[1]}</span></span></div><div class="visual-grid">${shuffle(round.pool).map(it=>`<div class="tile" data-answer="${it[1]===round.target[1]?'1':'0'}"><span class="emoji">${it[0]}</span><span class="label">${it[1]}</span></div>`).join('')}</div><div class="actions"><button class="btn" onclick="checkOnde()">Conferir</button></div><div id="feedback" class="feedback">Toque nas figuras iguais ao alvo.</div></div>`; screenShell(tool, body); $$('.tile').forEach(t=>t.addEventListener('click',()=>t.classList.toggle('chosen'))); }, combina(tool){ const r = shuffle(banks.combina)[0]; activityState.combina = r; const body = `<div class="play-area"><div class="instruction">O que combina com:</div><div><span class="big-target"><span>${r.a[0]}</span><span>${r.a[1]}</span></span></div><div class="choice-grid">${shuffle(r.options).map(o=>`<div class="tile" data-answer="${o[2]}"><span class="emoji">${o[0]}</span><span class="label">${o[1]}</span></div>`).join('')}</div><div id="feedback" class="feedback">Toque na melhor opção.</div></div>`; screenShell(tool, body); $$('.tile').forEach(t=>t.addEventListener('click',()=>{ $$('.tile').forEach(x=>x.classList.remove('chosen','correct','wrong')); t.classList.add('chosen'); if(t.dataset.answer==='1'){t.classList.add('correct');fb('Isso combina. Muito bem!','ok');record('combina','acertou combinação');celebrate()}else{t.classList.add('wrong');fb('Essa não combina muito. Tente outra.','bad')}})); }, sequencia(tool){ const r = shuffle(banks.sequencia)[0]; activityState.sequencia=r; const items = shuffle(r.steps); const zones = ['1','2','3']; const body = `<div class="play-area"><div class="instruction">Coloque na ordem: ${r.title}</div><div class="visual-grid" id="bank">${items.map(it=>tileHtml([it[1],it[2],it[0]],'smalltxt')).join('')}</div><div class="drop-wrap">${zones.map(z=>`<div class="dropzone" data-zone="${z}"><div class="zone-title">${z}º</div></div>`).join('')}</div><div class="actions"><button class="btn" onclick="checkOrder('sequencia')">Conferir</button></div><div id="feedback" class="feedback">Toque em uma figura e depois no número.</div></div>`; screenShell(tool, body); setupClickableTiles(); }, escolha(tool){ const r = shuffle(banks.escolha)[0]; activityState.escolha=r; const options = shuffle([[...r.good,1],[...r.other,0]]); const body = `<div class="play-area"><div class="instruction">${r.sit}</div><div class="subinstruction">Qual opção ajuda mais?</div><div class="choice-grid">${options.map(o=>`<div class="tile" data-answer="${o[2]}"><span class="emoji">${o[0]}</span><span class="label">${o[1]}</span></div>`).join('')}</div><div id="feedback" class="feedback">Toque em uma opção.</div></div>`; screenShell(tool, body); $$('.tile').forEach(t=>t.addEventListener('click',()=>{ $$('.tile').forEach(x=>x.classList.remove('chosen','correct','wrong')); t.classList.add('chosen'); if(t.dataset.answer==='1'){t.classList.add('correct');fb('Boa escolha. Essa opção ajuda mais.','ok');record('escolha','escolheu opção funcional');celebrate()}else{t.classList.add('wrong');fb('Essa opção pode não ajudar. Vamos tentar outra.','bad')}})); }, rotina(tool){ const r=shuffle(banks.rotina)[0]; activityState.rotina=r; const items=shuffle(r.steps); const zones=['1','2','3','4']; const body = `<div class="play-area"><div class="instruction">Monte a rotina: ${r.title}</div><div class="visual-grid" id="bank">${items.map(it=>tileHtml([it[1],it[2],it[0]],'smalltxt')).join('')}</div><div class="drop-wrap">${zones.map(z=>`<div class="dropzone" data-zone="${z}"><div class="zone-title">${z}</div></div>`).join('')}</div><div class="actions"><button class="btn" onclick="checkOrder('rotina')">Conferir</button></div><div id="feedback" class="feedback">Toque na figura e depois no número.</div></div>`; screenShell(tool, body); setupClickableTiles(); }, lugar(tool){ const items=shuffle(banks.lugar.items).slice(0,8); const body = `<div class="play-area"><div class="instruction">Leve cada item ao lugar.</div><div class="visual-grid" id="bank">${items.map(it=>tileHtml([it[0],it[1],it[2]],'smalltxt')).join('')}</div><div class="drop-wrap">${banks.lugar.zones.map(z=>`<div class="dropzone" data-zone="${z[0]}"><div class="zone-title">${z[1]}</div></div>`).join('')}</div><div class="actions"><button class="btn" onclick="checkZones('lugar')">Conferir</button></div><div id="feedback" class="feedback">Toque em um item e depois no lugar certo.</div></div>`; screenShell(tool, body); setupClickableTiles(); }, cor(tool){ const target=shuffle(banks.cor)[0]; const colors=banks.cor.map(c=>c.color); let cards=[]; for(let i=0;i<12;i++){const color=colors[i%colors.length]; cards.push(color)} cards.push(target.color,target.color); cards=shuffle(cards).slice(0,12); if(cards.filter(c=>c===target.color).length<3){cards[0]=target.color;cards[1]=target.color;cards[2]=target.color;} activityState.cor=target; const body=`<div class="play-area"><div class="instruction">Ache a cor:</div><div><span class="big-target"><span class="color-dot ${target.color}"></span><span>${target.label}</span></span></div><div class="visual-grid">${cards.map(c=>`<div class="tile" data-answer="${c===target.color?'1':'0'}"><span class="color-dot ${c}"></span></div>`).join('')}</div><div class="actions"><button class="btn" onclick="checkPick('cor')">Conferir</button></div><div id="feedback" class="feedback">Toque nas bolas da mesma cor.</div></div>`; screenShell(tool, body); $$('.tile').forEach(t=>t.addEventListener('click',()=>t.classList.toggle('chosen'))); }, tamanho(tool){ const shapes = shuffle(banks.tamanho).slice(0,4); const items = shapes.flatMap(x=>[ {symbol:x[0], label:x[1], key:'grande', note:'grande na tela', cls:'size-card-big'}, {symbol:x[0], label:x[1], key:'pequeno', note:'pequeno na tela', cls:'size-card-small'} ]); const body=`<div class="play-area size-activity"><div class="instruction">Separe pelo tamanho que aparece na tela.</div><div class="subinstruction">Agora a regra é visual: a mesma figura pode aparecer grande ou pequena. Não é o tamanho real do objeto, é o tamanho do desenho na tela.</div><div class="size-reference"><div class="size-ref-card"><span class="size-demo size-big">●</span><div><b>Grande na tela</b><span>desenho ocupa mais espaço</span></div></div><div class="size-ref-card"><span class="size-demo size-small">●</span><div><b>Pequeno na tela</b><span>desenho ocupa menos espaço</span></div></div></div><div class="visual-grid size-bank" id="bank">${shuffle(items).map(it=>`<div class="tile size-card ${it.cls}" draggable="true" data-id="${uid()}" data-key="${it.key}"><span class="size-demo">${it.symbol}</span><span class="label">${it.label}</span><span class="size-note">${it.note}</span></div>`).join('')}</div><div class="drop-wrap size-zones"><div class="dropzone" data-zone="grande"><div class="zone-title">Grande na tela</div></div><div class="dropzone" data-zone="pequeno"><div class="zone-title">Pequeno na tela</div></div></div><div class="actions"><button class="btn" onclick="checkZones('tamanho')">Conferir</button></div><div id="feedback" class="feedback">Toque em uma figura e depois escolha Grande na tela ou Pequeno na tela.</div></div>`; screenShell(tool, body); setupClickableTiles(); }
}; function checkOnde(){ checkPick('onde'); }
function checkPick(toolId){ let ok=true, chosen=0, needed=0; $$('.tile').forEach(t=>{const ans=t.dataset.answer==='1'; if(ans) needed++; if(t.classList.contains('chosen')) chosen++; t.classList.remove('correct','wrong'); if(t.classList.contains('chosen')&&ans)t.classList.add('correct'); if(t.classList.contains('chosen')&&!ans){t.classList.add('wrong'); ok=false;} if(ans&&!t.classList.contains('chosen')) ok=false;}); if(chosen===0){fb('Escolha pelo menos uma figura.','warn');return} if(ok){fb('Muito bem! Você encontrou as figuras certas.','ok');record(toolId,'atividade concluída');celebrate()} else {fb('Ainda tem algo para ajustar. Vamos tentar de novo.','bad')}
}
function checkOrder(toolId){ let ok=true, count=0; $$('.dropzone').forEach(zone=>{const tile=zone.querySelector('.tile'); if(tile){count++; if(tile.dataset.key!==zone.dataset.zone) ok=false; }}); const total=$$('.dropzone').length; if(count<total){fb('Ainda falta colocar figuras nos espaços.','warn');return} if(ok){fb('A ordem ficou certa. Muito bem!','ok');record(toolId,'ordem concluída');celebrate()} else fb('Alguma figura está fora de ordem. Vamos trocar.','bad');
}
function checkZones(toolId){ let ok=true,count=0; $$('.dropzone').forEach(zone=>{ $$('.tile',zone).forEach(tile=>{count++; if(tile.dataset.key!==zone.dataset.zone) ok=false; }); }); if(count===0){fb('Coloque pelo menos um item em uma categoria.','warn');return} if(ok){fb('Muito bem! Os itens estão no lugar certo.','ok');record(toolId,'classificação concluída');celebrate()} else fb('Tem item em um lugar que não combina. Vamos ajustar.','bad');
} const app = $('#app');
routeTo(location.hash.replace('#',''));
