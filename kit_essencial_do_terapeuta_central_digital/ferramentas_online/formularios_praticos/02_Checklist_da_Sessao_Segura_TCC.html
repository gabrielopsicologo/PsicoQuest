<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Checklist da Sessão Segura - TCC</title><style>
body{font-family:Arial,sans-serif;background:#f7f4ee;color:#0d1b2a;margin:0}main{max-width:960px;margin:auto;padding:28px 18px}h1{font-size:28px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}button,a.btn{border:1px solid #c7ced8;background:white;padding:10px 14px;border-radius:10px;font-weight:700;color:#0d1b2a;text-decoration:none;cursor:pointer}button.primary{background:#0d1b2a;color:white}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}label{display:flex;flex-direction:column;gap:6px;font-weight:700;background:white;border:1px solid #c7ced8;border-radius:12px;padding:12px}input,textarea{font:inherit;border:1px solid #9aa6b5;border-radius:8px;padding:10px;min-height:42px}textarea{min-height:110px;resize:vertical}.full{grid-column:1/-1}.check{flex-direction:row;align-items:flex-start;font-weight:400}.check input{min-height:auto;margin-top:3px}@media(max-width:720px){.grid{grid-template-columns:1fr}}@media print{.toolbar{display:none}body{background:white}main{padding:10mm}label{break-inside:avoid}}
</style></head><body><main><h1>Checklist da Sessão Segura - TCC</h1><div class="toolbar"><button class="primary" onclick="localStorage.setItem(location.pathname,document.body.innerHTML);alert('Rascunho salvo localmente neste navegador.')">Salvar rascunho local</button><button onclick="window.print()">Imprimir / salvar em PDF</button><button onclick="document.querySelectorAll('input,textarea').forEach(e=>{if(e.type==='checkbox')e.checked=false;else e.value=''})">Limpar campos</button><button onclick="history.length>1?history.back():location.href='../../index.html'">Voltar</button></div><section class="grid"><label>Paciente<input></label><label>Data<input></label><label>Sessão nº<input></label><label>Objetivo principal<input></label><label class="full">Observações finais<textarea></textarea></label></section><section><label class="check"><input type="checkbox"> <span>Revisar dados principais do paciente.</span></label><label class="check"><input type="checkbox"> <span>Definir objetivo da sessão.</span></label><label class="check"><input type="checkbox"> <span>Retomar tarefa ou combinado anterior.</span></label><label class="check"><input type="checkbox"> <span>Mapear situação, pensamento, emoção e comportamento.</span></label><label class="check"><input type="checkbox"> <span>Escolher uma intervenção compatível com a demanda.</span></label><label class="check"><input type="checkbox"> <span>Registrar pontos principais.</span></label><label class="check"><input type="checkbox"> <span>Definir tarefa, experimento ou próximo passo.</span></label><label class="check"><input type="checkbox"> <span>Anotar pontos de atenção para a próxima sessão.</span></label></section></main></body></html>
