<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Checklist Ético para Documentos Psicológicos</title><style>
:root{--bg:#f7f4ee;--ink:#0d1b2a;--muted:#647084;--line:#c9ced8;--accent:#b9944c;--card:#ffffff;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,Helvetica,sans-serif;line-height:1.45}main{max-width:980px;margin:0 auto;padding:30px 18px 80px}h1{font-size:30px;margin:0 0 8px}h2{font-size:18px;margin:24px 0 10px}.muted{color:var(--muted)}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0}.btn{border:1px solid var(--line);background:#fff;padding:10px 14px;border-radius:10px;text-decoration:none;color:var(--ink);font-weight:700;cursor:pointer}.btn.primary{background:var(--ink);color:#fff}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{display:flex;flex-direction:column;gap:6px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px}.field label{font-weight:700}.field input,.field textarea{width:100%;min-height:44px;border:1px solid #aeb6c3;border-radius:8px;padding:10px;font:inherit;background:#fff}.field textarea{min-height:110px;resize:vertical}.full{grid-column:1/-1}.check{display:flex;align-items:flex-start;gap:10px;padding:8px 0}.check input{margin-top:4px}.box{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin:14px 0}@media(max-width:720px){.grid{grid-template-columns:1fr}h1{font-size:24px}}@media print{body{background:#fff}.toolbar{display:none}.box,.field{break-inside:avoid}main{padding:10mm}.field input,.field textarea{border:1px solid #444}.muted{display:none}}
</style></head><body><main><h1>Checklist Ético para Documentos Psicológicos</h1><p class="muted">Versão prática sem marca. Preencha localmente no navegador. Os dados não são enviados para servidor.</p><div class="toolbar"><button class="btn primary" onclick="localStorage.setItem(location.pathname,document.body.innerHTML);alert('Rascunho salvo localmente neste navegador.')">Salvar rascunho local</button><button class="btn" onclick="window.print()">Imprimir / salvar em PDF</button><button class="btn" onclick="document.querySelectorAll('input,textarea').forEach(e=>{if(e.type==='checkbox')e.checked=false;else e.value=''})">Limpar campos</button><button class="btn" onclick="history.length>1?history.back():location.href='../../index.html'">Voltar</button></div><div class="box"><h2>Checklist</h2><label class="check"><input type="checkbox"> <span>A finalidade do documento está clara.</span></label><label class="check"><input type="checkbox"> <span>O solicitante e destinatário foram identificados.</span></label><label class="check"><input type="checkbox"> <span>O documento contém apenas informações necessárias.</span></label><label class="check"><input type="checkbox"> <span>As informações estão sustentadas nos registros do caso.</span></label><label class="check"><input type="checkbox"> <span>Foi verificada autorização do paciente/responsável quando necessária.</span></label><label class="check"><input type="checkbox"> <span>O documento foi revisado antes do envio.</span></label><label class="check"><input type="checkbox"> <span>As limitações do documento estão consideradas.</span></label></div><div class="field full"><label>Observações</label><textarea></textarea></div></main></body></html>
